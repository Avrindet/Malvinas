name: Publicar en GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Obtener código
        uses: actions/checkout@v4

      - name: Preparar sitio estático
        run: |
          mkdir -p _site
          cp index.html _site/
          cp manifest.webmanifest _site/
          cp sw.js _site/
          cp .nojekyll _site/
          cp -r css js _site/
          if [ -d assets ]; then cp -r assets _site/; fi
          if [ -d audio ]; then cp -r audio _site/; fi

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
